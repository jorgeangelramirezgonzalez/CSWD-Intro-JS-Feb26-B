<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Shopping List</title>
</head>
<body>
    <main>
        <h1>Shopping List</h1>
        <ul>
            <li>pine nuts</li>
            <li class="cold">milk</li>
            <li>honey</li>
            <li>apples</li>
        </ul>
        <form>
            <label for="new-item">Add Item to List:</label>
            <input type="text" name="new-item" id="new-item">
            <label for="cold-item">Is the item cold?</label>
            <input type="checkbox" name="cold-item" id="cold-item">
            <button type="submit">Add item</button>
        </form>
        <div id="clock"></div>
    </main>
    <script src="script.js"></script>
</body>
</html>
